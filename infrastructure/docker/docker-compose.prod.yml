version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nrt_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nrt_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecureProdPass2026!}
      POSTGRES_DB: ${POSTGRES_DB:-nrt_ops_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nrt_admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: nrt_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-nrt_admin}:${POSTGRES_PASSWORD:-SecureProdPass2026!}@postgres:5432/${POSTGRES_DB:-nrt_ops_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-SuperSecretProdJwtKey2026!}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3001"

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: nrt_web_prod
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: nrt_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
